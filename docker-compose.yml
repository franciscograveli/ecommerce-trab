services:
  backend:
    build: ./backend
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ecommerce_b2b
      DB_USERNAME: root
      DB_PASSWORD: root
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    command: apache2-foreground

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

  db:
    image: mariadb:10.11
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: ecommerce_b2b
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 15s
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  backend_vendor:
