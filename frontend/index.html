<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — B2B Atacado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/js/tw-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/base.css">
</head>
<body class="min-h-screen bg-brand-black font-sans flex items-center justify-center p-4">

  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-brand-gold tracking-wide">B2B Atacado</h1>
      <p class="text-brand-tan text-xs mt-1 tracking-widest uppercase">Destilados & Spirits</p>
    </div>

    <!-- Card -->
    <div class="bg-brand-dark border border-brand-brown rounded-2xl p-8">

      <h2 class="text-brand-cream text-sm font-semibold mb-6">Acesse sua conta</h2>

      <div id="alert" class="mb-4"></div>

      <form id="form-login" class="flex flex-col gap-4">

        <div>
          <label class="block text-xs font-medium text-brand-tan mb-1.5">E-mail</label>
          <input type="email" id="email" required autocomplete="email"
            placeholder="seu@email.com"
            class="w-full bg-brand-black border border-brand-brown rounded-lg px-3 py-2.5
                   text-sm text-brand-cream placeholder-brand-tan
                   focus:outline-none focus:border-brand-primary focus:ring-1 focus:ring-brand-primary
                   transition-colors">
        </div>

        <div>
          <label class="block text-xs font-medium text-brand-tan mb-1.5">Senha</label>
          <input type="password" id="senha" required autocomplete="current-password"
            placeholder="••••••••"
            class="w-full bg-brand-black border border-brand-brown rounded-lg px-3 py-2.5
                   text-sm text-brand-cream placeholder-brand-tan
                   focus:outline-none focus:border-brand-primary focus:ring-1 focus:ring-brand-primary
                   transition-colors">
        </div>

        <button type="submit" id="btn-login"
          class="mt-2 w-full bg-brand-primary hover:bg-amber-700 text-white font-semibold
                 py-2.5 rounded-lg text-sm transition-colors flex items-center justify-center gap-2">
          Entrar
        </button>

      </form>

    </div>

    <p class="text-center text-brand-brown text-xs mt-6">
      Acesso restrito a usuários autorizados.
    </p>

  </div>

  <script src="/js/api.js"></script>
  <script src="/js/pages/login.js"></script>
</body>
</html>
