<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabelas de Preço — B2B Atacado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/js/tw-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="/css/base.css">
</head>
<body class="bg-brand-black font-sans">

  <div id="sidebar"></div>
  <div id="topbar"></div>

  <main id="main" class="p-6 bg-brand-black">

    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-brand-cream text-lg font-semibold">Tabelas de Preço</h2>
        <p class="text-brand-tan text-xs mt-0.5">Grupos de precificação por volume</p>
      </div>
      <button onclick="openModal()"
        class="flex items-center gap-2 bg-brand-primary hover:bg-amber-700 text-white
               text-xs font-semibold px-4 py-2 rounded-lg transition-colors">
        <i data-lucide="plus" class="w-3.5 h-3.5"></i>
        Nova Tabela
      </button>
    </div>

    <div id="alert" class="mb-4"></div>

    <div class="bg-brand-dark border border-brand-brown rounded-xl overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="border-b border-brand-brown">
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Nome</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Vol. mínimo</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="2" class="px-5 py-10 text-center text-brand-tan">Carregando…</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <p class="text-brand-brown text-[11px] mt-3">
      Edição e exclusão de tabelas estará disponível em breve.
    </p>

  </main>

  <!-- Modal: Nova Tabela -->
  <div id="modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
    <div class="bg-white border border-brand-primary/30 rounded-2xl w-full max-w-md p-7 shadow-xl">

      <div class="flex items-center justify-between mb-6">
        <h3 class="text-gray-900 text-sm font-semibold">Nova Tabela de Preço</h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>

      <form id="form-tabela" class="flex flex-col gap-4">

        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1.5">Nome *</label>
          <input type="text" id="f-nome" required placeholder="ex.: Varejo, Atacado A, Atacado B"
            class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2.5
                   text-sm text-gray-900 placeholder-gray-400
                   focus:outline-none focus:border-brand-primary focus:ring-1 focus:ring-brand-primary transition-colors">
        </div>

        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1.5">Volume mínimo (unidades)</label>
          <input type="number" id="f-volume" min="1" step="1" value="1"
            class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2.5
                   text-sm text-gray-900 placeholder-gray-400
                   focus:outline-none focus:border-brand-primary focus:ring-1 focus:ring-brand-primary transition-colors">
        </div>

        <div class="flex justify-end gap-3 mt-2 pt-2 border-t border-gray-100">
          <button type="button" onclick="closeModal()"
            class="px-4 py-2 text-xs font-medium text-gray-600 border border-gray-200
                   rounded-lg hover:bg-gray-50 transition-colors">
            Cancelar
          </button>
          <button type="submit" id="btn-salvar"
            class="px-4 py-2 text-xs font-semibold bg-brand-primary hover:bg-amber-700
                   text-white rounded-lg transition-colors">
            Criar Tabela
          </button>
        </div>
      </form>

    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/pages/precos.js"></script>
  <script>Layout('Tabelas de Preço');</script>
</body>
</html>
