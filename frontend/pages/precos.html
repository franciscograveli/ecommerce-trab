<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabelas de Preço — B2B Atacado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/js/tw-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="/css/base.css">
</head>
<body class="bg-brand-black font-sans">

  <div id="sidebar"></div>
  <div id="topbar"></div>

  <main id="main" class="p-6 bg-brand-black">

    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-brand-cream text-lg font-semibold">Tabelas de Preço</h2>
        <p class="text-brand-tan text-xs mt-0.5">Grupos de precificação por volume</p>
      </div>
      <button onclick="openModal()"
        class="flex items-center gap-2 bg-brand-primary hover:bg-amber-700 text-white
               text-xs font-semibold px-4 py-2 rounded-lg transition-colors">
        <i data-lucide="plus" class="w-3.5 h-3.5"></i>
        Nova Tabela
      </button>
    </div>

    <div id="alert" class="mb-4"></div>

    <div class="bg-brand-dark border border-brand-brown rounded-xl overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="border-b border-brand-brown">
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Nome</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Região</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Vol. Mínimo</th>
              <th class="px-5 py-3"></th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="4" class="px-5 py-10 text-center text-brand-tan">Carregando…</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>


  </main>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/modal.js"></script>
  <script src="/js/pages/precos.js"></script>
  <script>Layout('Tabelas de Preço');</script>
</body>
</html>
