<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estoque — B2B Atacado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/js/tw-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="/css/base.css">
</head>
<body class="bg-brand-black font-sans">

  <div id="sidebar"></div>
  <div id="topbar"></div>

  <main id="main" class="p-6 bg-brand-black">

    <!-- Cabeçalho -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-brand-cream text-lg font-semibold">Estoque</h2>
        <p class="text-brand-tan text-xs mt-0.5">Controle de inventário por grade e depósito</p>
      </div>
      <div class="flex gap-2">
        <button onclick="openModalDeposito()"
          class="flex items-center gap-2 border border-brand-brown text-brand-tan hover:text-brand-cream
                 hover:border-brand-tan text-xs font-semibold px-4 py-2 rounded-lg transition-colors">
          <i data-lucide="warehouse" class="w-3.5 h-3.5"></i>
          Depósito
        </button>
        <button onclick="openModalAjuste()"
          class="flex items-center gap-2 bg-brand-primary hover:bg-amber-700 text-white
                 text-xs font-semibold px-4 py-2 rounded-lg transition-colors">
          <i data-lucide="plus" class="w-3.5 h-3.5"></i>
          Ajustar Estoque
        </button>
      </div>
    </div>

    <div id="alert" class="mb-4"></div>

    <!-- Filtros -->
    <div class="flex gap-3 mb-4">
      <select id="filtro-deposito" onchange="renderTabela()"
        class="bg-brand-dark border border-brand-brown rounded-lg px-3 py-2
               text-xs text-brand-cream focus:outline-none focus:border-brand-primary transition-colors">
        <option value="">Todos os depósitos</option>
      </select>
    </div>

    <!-- Tabela de estoque -->
    <div class="bg-brand-dark border border-brand-brown rounded-xl overflow-hidden mb-6">
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="border-b border-brand-brown">
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Produto</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Volume</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Depósito</th>
              <th class="px-5 py-3 text-right text-brand-tan font-semibold uppercase tracking-wider">Quantidade</th>
              <th class="px-5 py-3"></th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="5" class="px-5 py-10 text-center text-brand-tan">Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Depósitos -->
    <div class="bg-brand-dark border border-brand-brown rounded-xl overflow-hidden">
      <div class="px-5 py-3 border-b border-brand-brown">
        <h3 class="text-brand-cream text-xs font-semibold uppercase tracking-wider">Depósitos</h3>
      </div>
      <div id="lista-depositos" class="divide-y divide-brand-brown/40">
        <p class="px-5 py-4 text-brand-tan text-xs">Carregando…</p>
      </div>
    </div>

  </main>

  <!-- Modal ajuste de estoque -->
  <div id="modal-ajuste" class="hidden fixed inset-0 bg-brand-black/75 z-50 flex items-center justify-center p-4">
    <div class="bg-brand-dark border border-brand-brown rounded-2xl w-full max-w-md p-7">
      <div class="flex items-center justify-between mb-6">
        <h3 id="modal-ajuste-title" class="text-brand-cream text-sm font-semibold">Ajustar Estoque</h3>
        <button onclick="closeModalAjuste()" class="text-brand-tan hover:text-brand-cream transition-colors">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
      <form id="form-ajuste" class="flex flex-col gap-4">
        <input type="hidden" id="aj-grade-id">
        <input type="hidden" id="aj-deposito-id-fixed">

        <!-- Modo livre: selecionar produto → grade → depósito -->
        <div id="fields-livre">
          <div class="mb-4">
            <label class="block text-xs font-medium text-brand-tan mb-1.5">Produto</label>
            <select id="aj-produto" onchange="onProdutoChange()"
              class="w-full bg-brand-black border border-brand-brown rounded-lg px-3 py-2.5
                     text-sm text-brand-cream focus:outline-none focus:border-brand-primary transition-colors">
              <option value="">Selecione…</option>
            </select>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium text-brand-tan mb-1.5">Grade (volume)</label>
              <select id="aj-grade"
                class="w-full bg-brand-black border border-brand-brown rounded-lg px-3 py-2.5
                       text-sm text-brand-cream focus:outline-none focus:border-brand-primary transition-colors">
                <option value="">Selecione…</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-brand-tan mb-1.5">Depósito</label>
              <select id="aj-deposito"
                class="w-full bg-brand-black border border-brand-brown rounded-lg px-3 py-2.5
                       text-sm text-brand-cream focus:outline-none focus:border-brand-primary transition-colors">
                <option value="">Selecione…</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Modo fixo: grade/depósito pré-selecionados -->
        <div id="fields-fixo" class="hidden">
          <div class="bg-brand-black/50 border border-brand-brown/40 rounded-lg px-4 py-3 mb-1">
            <p id="fixo-label" class="text-brand-cream text-xs font-medium"></p>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-brand-tan mb-1.5">Quantidade</label>
            <input type="number" id="aj-quantidade" required min="0" step="1"
              class="w-full bg-brand-black border border-brand-brown rounded-lg px-3 py-2.5
                     text-sm text-brand-cream placeholder-brand-tan
                     focus:outline-none focus:border-brand-primary transition-colors">
          </div>
          <div>
            <label class="block text-xs font-medium text-brand-tan mb-1.5">Operação</label>
            <select id="aj-operacao"
              class="w-full bg-brand-black border border-brand-brown rounded-lg px-3 py-2.5
                     text-sm text-brand-cream focus:outline-none focus:border-brand-primary transition-colors">
              <option value="entrada">Entrada (+)</option>
              <option value="saida">Saída (−)</option>
            </select>
          </div>
        </div>

        <div class="flex justify-end gap-3 mt-2 pt-2 border-t border-brand-brown">
          <button type="button" onclick="closeModalAjuste()"
            class="px-4 py-2 text-xs font-medium text-brand-tan border border-brand-brown
                   rounded-lg hover:bg-brand-brown/30 transition-colors">
            Cancelar
          </button>
          <button type="submit" id="btn-ajuste"
            class="px-4 py-2 text-xs font-semibold bg-brand-primary hover:bg-amber-700
                   text-white rounded-lg transition-colors">
            Salvar
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal novo depósito -->
  <div id="modal-deposito" class="hidden fixed inset-0 bg-brand-black/75 z-50 flex items-center justify-center p-4">
    <div class="bg-brand-dark border border-brand-brown rounded-2xl w-full max-w-sm p-7">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-brand-cream text-sm font-semibold">Novo Depósito</h3>
        <button onclick="closeModalDeposito()" class="text-brand-tan hover:text-brand-cream transition-colors">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
      <form id="form-deposito" class="flex flex-col gap-4">
        <div>
          <label class="block text-xs font-medium text-brand-tan mb-1.5">Nome *</label>
          <input type="text" id="dep-nome" required
            class="w-full bg-brand-black border border-brand-brown rounded-lg px-3 py-2.5
                   text-sm text-brand-cream placeholder-brand-tan
                   focus:outline-none focus:border-brand-primary transition-colors">
        </div>
        <div>
          <label class="block text-xs font-medium text-brand-tan mb-1.5">Localização</label>
          <input type="text" id="dep-local"
            class="w-full bg-brand-black border border-brand-brown rounded-lg px-3 py-2.5
                   text-sm text-brand-cream placeholder-brand-tan
                   focus:outline-none focus:border-brand-primary transition-colors">
        </div>
        <div class="flex justify-end gap-3 pt-2 border-t border-brand-brown">
          <button type="button" onclick="closeModalDeposito()"
            class="px-4 py-2 text-xs font-medium text-brand-tan border border-brand-brown
                   rounded-lg hover:bg-brand-brown/30 transition-colors">
            Cancelar
          </button>
          <button type="submit" id="btn-deposito"
            class="px-4 py-2 text-xs font-semibold bg-brand-primary hover:bg-amber-700
                   text-white rounded-lg transition-colors">
            Salvar
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/pages/estoque.js"></script>
  <script>Layout('Estoque');</script>
</body>
</html>
