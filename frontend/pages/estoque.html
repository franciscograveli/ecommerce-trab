<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estoque — B2B Atacado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/js/tw-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="/css/base.css">
</head>
<body class="bg-brand-black font-sans">

  <div id="sidebar"></div>
  <div id="topbar"></div>

  <main id="main" class="p-6 bg-brand-black">

    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-brand-cream text-lg font-semibold">Estoque</h2>
        <p class="text-brand-tan text-xs mt-0.5">Controle de inventário por grade e depósito</p>
      </div>
      <div class="flex gap-2">
        <button onclick="openModalDeposito()"
          class="flex items-center gap-2 border border-brand-brown text-brand-tan hover:text-brand-cream
                 hover:border-brand-tan text-xs font-semibold px-4 py-2 rounded-lg transition-colors">
          <i data-lucide="warehouse" class="w-3.5 h-3.5"></i>
          Depósito
        </button>
        <button onclick="openModalAjuste()"
          class="flex items-center gap-2 bg-brand-primary hover:bg-amber-700 text-white
                 text-xs font-semibold px-4 py-2 rounded-lg transition-colors">
          <i data-lucide="plus" class="w-3.5 h-3.5"></i>
          Ajustar Estoque
        </button>
      </div>
    </div>

    <div id="alert" class="mb-4"></div>

    <div class="flex gap-3 mb-4">
      <select id="filtro-deposito" onchange="renderTabela()"
        class="bg-brand-dark border border-brand-brown rounded-lg px-3 py-2
               text-xs text-brand-cream focus:outline-none focus:border-brand-primary transition-colors">
        <option value="">Todos os depósitos</option>
      </select>
    </div>

    <div class="bg-brand-dark border border-brand-brown rounded-xl overflow-hidden mb-6">
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="border-b border-brand-brown">
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Produto</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Volume</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Depósito</th>
              <th class="px-5 py-3 text-right text-brand-tan font-semibold uppercase tracking-wider">Quantidade</th>
              <th class="px-5 py-3"></th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="5" class="px-5 py-10 text-center text-brand-tan">Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="bg-brand-dark border border-brand-brown rounded-xl overflow-hidden">
      <div class="px-5 py-3 border-b border-brand-brown">
        <h3 class="text-brand-cream text-xs font-semibold uppercase tracking-wider">Depósitos</h3>
      </div>
      <div id="lista-depositos" class="divide-y divide-brand-brown/40">
        <p class="px-5 py-4 text-brand-tan text-xs">Carregando…</p>
      </div>
    </div>

  </main>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/modal.js"></script>
  <script src="/js/pages/estoque.js"></script>
  <script>Layout('Estoque');</script>
</body>
</html>
