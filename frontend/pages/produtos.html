<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos — B2B Atacado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/js/tw-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="/css/base.css">
</head>
<body class="bg-brand-black font-sans">

  <div id="sidebar"></div>
  <div id="topbar"></div>

  <main id="main" class="p-6 bg-brand-black">

    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-brand-cream text-lg font-semibold">Produtos</h2>
        <p class="text-brand-tan text-xs mt-0.5">Catálogo, grades e tabelas de preço</p>
      </div>
      <div class="flex gap-2">
        <button onclick="openModalTabela()"
          class="flex items-center gap-2 border border-brand-brown text-brand-tan hover:text-brand-cream
                 hover:border-brand-tan text-xs font-semibold px-4 py-2 rounded-lg transition-colors">
          <i data-lucide="tags" class="w-3.5 h-3.5"></i>
          Nova Tabela de Preço
        </button>
        <button onclick="openModalProduto()"
          class="flex items-center gap-2 bg-brand-primary hover:bg-amber-700 text-white
                 text-xs font-semibold px-4 py-2 rounded-lg transition-colors">
          <i data-lucide="plus" class="w-3.5 h-3.5"></i>
          Novo Produto
        </button>
      </div>
    </div>

    <div id="alert" class="mb-4"></div>

    <!-- Tabela de produtos -->
    <div class="bg-brand-dark border border-brand-brown rounded-xl overflow-hidden mb-6">
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="border-b border-brand-brown">
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Nome</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Descrição</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Grades</th>
              <th class="px-5 py-3"></th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="4" class="px-5 py-10 text-center text-brand-tan">Carregando…</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Tabelas de preço -->
    <div class="bg-brand-dark border border-brand-brown rounded-xl overflow-hidden">
      <div class="px-5 py-3 border-b border-brand-brown">
        <h3 class="text-brand-cream text-xs font-semibold uppercase tracking-wider">Tabelas de Preço</h3>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="border-b border-brand-brown">
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Nome</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Região</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Vol. Mínimo</th>
              <th class="px-5 py-3"></th>
            </tr>
          </thead>
          <tbody id="tbody-tabelas">
            <tr><td colspan="4" class="px-5 py-10 text-center text-brand-tan">Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/modal.js"></script>
  <script src="/js/masks.js"></script>
  <script src="/js/pages/produtos.js"></script>
  <script>Layout('Produtos');</script>
</body>
</html>
