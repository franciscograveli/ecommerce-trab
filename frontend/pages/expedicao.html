<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expedição — B2B Atacado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/js/tw-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="/css/base.css">
</head>
<body class="bg-brand-black font-sans">

  <div id="sidebar"></div>
  <div id="topbar"></div>

  <main id="main" class="p-6 bg-brand-black">

    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-brand-cream text-lg font-semibold">Expedição</h2>
        <p class="text-brand-tan text-xs mt-0.5">Separação, embalagem e despacho</p>
      </div>
      <button onclick="openModalNovaExp()"
        class="flex items-center gap-2 bg-brand-primary hover:bg-amber-700 text-white
               text-xs font-semibold px-4 py-2 rounded-lg transition-colors">
        <i data-lucide="plus" class="w-3.5 h-3.5"></i>
        Nova Expedição
      </button>
    </div>

    <div id="alert" class="mb-4"></div>

    <div class="flex gap-2 mb-4 flex-wrap">
      <button onclick="setFiltro('')"       data-f="" class="filtro-btn filtro-ativo">Todos</button>
      <button onclick="setFiltro('picking_pendente')"  data-f="picking_pendente"  class="filtro-btn">Picking Pendente</button>
      <button onclick="setFiltro('picking_concluido')" data-f="picking_concluido" class="filtro-btn">Picking OK</button>
      <button onclick="setFiltro('packing')"           data-f="packing"           class="filtro-btn">Packing</button>
      <button onclick="setFiltro('pronto_envio')"      data-f="pronto_envio"      class="filtro-btn">Pronto Envio</button>
      <button onclick="setFiltro('em_transito')"       data-f="em_transito"       class="filtro-btn">Em Trânsito</button>
    </div>

    <div class="bg-brand-dark border border-brand-brown rounded-xl overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="border-b border-brand-brown">
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Pedido</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Empresa</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Status</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Transportadora</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Rastreio</th>
              <th class="px-5 py-3"></th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="6" class="px-5 py-10 text-center text-brand-tan">Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <style>
    .filtro-btn {
      padding: 0.375rem 0.875rem;
      border-radius: 0.5rem;
      font-size: 0.7rem;
      font-weight: 500;
      border: 1px solid rgb(var(--brand-brown-rgb));
      color: rgb(var(--brand-tan-rgb));
      transition: all 0.15s;
      cursor: pointer;
      background: transparent;
    }
    .filtro-btn:hover { color: rgb(var(--brand-cream-rgb)); border-color: rgb(var(--brand-tan-rgb)); }
    .filtro-btn.filtro-ativo {
      background: rgb(var(--brand-primary-rgb) / 0.2);
      border-color: rgb(var(--brand-primary-rgb));
      color: rgb(var(--brand-amber-rgb));
    }
  </style>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/modal.js"></script>
  <script src="/js/masks.js"></script>
  <script src="/js/pages/expedicao.js"></script>
  <script>Layout('Expedição');</script>
</body>
</html>
