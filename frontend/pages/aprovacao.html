<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aprovação — B2B Atacado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/js/tw-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="/css/base.css">
</head>
<body class="bg-brand-black font-sans">

  <div id="sidebar"></div>
  <div id="topbar"></div>

  <main id="main" class="p-6 bg-brand-black">

    <div class="mb-6">
      <h2 class="text-brand-cream text-lg font-semibold">Fila de Aprovação</h2>
      <p class="text-brand-tan text-xs mt-0.5">Pedidos bloqueados por crédito ou estoque insuficiente</p>
    </div>

    <div id="alert" class="mb-4"></div>

    <!-- Stat -->
    <div id="stat-card" class="bg-brand-dark border border-brand-brown rounded-xl p-5 mb-6 inline-flex items-center gap-4">
      <div class="w-9 h-9 rounded-lg bg-yellow-900/60 flex items-center justify-center">
        <i data-lucide="clock" class="w-4 h-4 text-yellow-300"></i>
      </div>
      <div>
        <p class="text-brand-tan text-xs">Aguardando aprovação</p>
        <p id="stat-count" class="text-brand-cream text-2xl font-bold">—</p>
      </div>
    </div>

    <div class="bg-brand-dark border border-brand-brown rounded-xl overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="border-b border-brand-brown">
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">#</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Empresa</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Motivo</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Valor Pedido</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Lim. Crédito</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Data</th>
              <th class="px-5 py-3"></th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="7" class="px-5 py-10 text-center text-brand-tan">Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/pages/aprovacao.js"></script>
  <script>Layout('Aprovação');</script>
</body>
</html>
