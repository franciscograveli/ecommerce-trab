<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos — B2B Atacado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/js/tw-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="/css/base.css">
</head>
<body class="bg-brand-black font-sans">

  <div id="sidebar"></div>
  <div id="topbar"></div>

  <main id="main" class="p-6 bg-brand-black">

    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-brand-cream text-lg font-semibold">Pedidos</h2>
        <p class="text-brand-tan text-xs mt-0.5">Orçamentos e pedidos em andamento</p>
      </div>
      <button id="btn-novo" onclick="openModalPedido()"
        class="flex items-center gap-2 bg-brand-primary hover:bg-amber-700 text-white
               text-xs font-semibold px-4 py-2 rounded-lg transition-colors">
        <i data-lucide="plus" class="w-3.5 h-3.5"></i>
        Novo Orçamento
      </button>
    </div>

    <div id="alert" class="mb-4"></div>

    <!-- Filtros de status -->
    <div class="flex gap-2 mb-4 flex-wrap">
      <button onclick="filtrar('')"      id="tab-"      class="tab-btn tab-ativo">Todos</button>
      <button onclick="filtrar('orcamento')"             id="tab-orcamento"             class="tab-btn">Orçamento</button>
      <button onclick="filtrar('aguardando_aprovacao_credito')" id="tab-aguardando_aprovacao_credito" class="tab-btn">Aguard. Crédito</button>
      <button onclick="filtrar('aguardando_estoque')"          id="tab-aguardando_estoque"          class="tab-btn">Aguard. Estoque</button>
      <button onclick="filtrar('aprovado')"              id="tab-aprovado"              class="tab-btn">Aprovado</button>
      <button onclick="filtrar('em_separacao')"          id="tab-em_separacao"          class="tab-btn">Em Separação</button>
      <button onclick="filtrar('enviado')"               id="tab-enviado"               class="tab-btn">Enviado</button>
      <button onclick="filtrar('entregue')"              id="tab-entregue"              class="tab-btn">Entregue</button>
      <button onclick="filtrar('cancelado')"             id="tab-cancelado"             class="tab-btn">Cancelado</button>
    </div>

    <div class="bg-brand-dark border border-brand-brown rounded-xl overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="border-b border-brand-brown">
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">#</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Empresa</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Valor Total</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Status</th>
              <th class="px-5 py-3 text-left text-brand-tan font-semibold uppercase tracking-wider">Data</th>
              <th class="px-5 py-3"></th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="6" class="px-5 py-10 text-center text-brand-tan">Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <style>
    .tab-btn {
      padding: 0.375rem 0.875rem;
      border-radius: 0.5rem;
      font-size: 0.7rem;
      font-weight: 600;
      color: #a89070;
      background: transparent;
      border: 1px solid #4a3728;
      transition: all 0.15s;
      cursor: pointer;
    }
    .tab-btn:hover { background: #2a1f14; }
    .tab-ativo { background: #92400e; color: #fff; border-color: #92400e; }
  </style>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/modal.js"></script>
  <script src="/js/masks.js"></script>
  <script src="/js/pages/pedidos.js"></script>
  <script>Layout('Pedidos');</script>
</body>
</html>
